version: 2

updates:
  # -------- Gradle dependencies --------
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-non-major-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    ignore:
      # Ignore major updates for Mongo
      - dependency-name: "org.mongodb:*"
        update-types:
          - "version-update:semver-major"

  # -------- Docker images --------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-non-major-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    ignore:
      # Ignore major image bumps for Mongo
      - dependency-name: "mongo"
        update-types:
          - "version-update:semver-major"